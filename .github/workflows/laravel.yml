name: Auto Create Laravel Project

on:
  workflow_dispatch: # Tombol manual di tab Actions
  push:
    branches: [ "main" ]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # PENTING: Izin agar GitHub bisa menulis ke repo kamu

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Create Laravel Project
      run: |
        # Buat project di folder sementara agar tidak bentrok dengan folder .git
        composer create-project laravel/laravel temp-laravel
        
        # Pindahkan semua file (termasuk yang tersembunyi/dotfiles) ke root repo
        cp -rn temp-laravel/. .
        rm -rf temp-laravel

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Cek apakah ada file baru untuk di-commit
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "Chore: Auto-generate Laravel project structure"
          git push
        else
          echo "No changes to commit"
        fi

